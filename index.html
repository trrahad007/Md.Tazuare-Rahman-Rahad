<style>
  :root {
    --bg: #f7f9fc; --card: #ffffff; --text: #0f1729; --muted: #5b6779; --border: #e1e6ee; --accent: #1d4ed8;
  }
  [data-theme="dark"] {
    --bg: #0a0e16; --card: #121826; --text: #e6eaf2; --muted: #8893a8; --border: #232c3d; --accent: #3b82f6;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; }
  a { color: var(--accent); text-decoration: none; }
  nav { position: sticky; top: 0; z-index: 30; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; gap: 12px; flex-wrap: wrap; }
  nav .links { display: flex; gap: 4px; flex-wrap: wrap; }
  nav .links button { background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; padding: 6px 10px; border-radius: 8px; font-family: inherit; }
  nav .links button.active { background: var(--card); border: 1px solid var(--border); color: var(--accent); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn:hover { border-color: var(--accent); }
  .btn-icon { padding: 8px; }
  .btn-accent { background: var(--accent); color: #fff; border: none; }
  .btn-tab.active { background: var(--accent); color: #fff; border: none; }
  section.page { padding: 40px 24px 60px; max-width: 1100px; margin: 0 auto; }
  .hero { padding: 56px 24px; max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 1fr; gap: 32px; align-items: center; }
  @media (max-width: 760px) { .hero { grid-template-columns: 1fr; } }
  .avatar { border-radius: 50%; object-fit: cover; }
  h1.hero-role { font-size: 38px; font-weight: 800; margin: 0 0 18px; letter-spacing: -0.5px; color: var(--accent); min-height: 48px; }
  .section-title-wrap { text-align: center; margin-bottom: 36px; }
  .section-title-wrap h2 { font-size: 30px; font-weight: 800; margin: 0 0 8px; letter-spacing: -0.4px; }
  .section-title-wrap p { font-size: 14px; color: var(--muted); margin: 0; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
  .timeline { border-left: 2px solid var(--border); padding-left: 18px; }
  .timeline-item { margin-bottom: 16px; position: relative; }
  .timeline-dot { position: absolute; left: -24px; top: 4px; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
  .heat-grid { display: flex; gap: 3px; overflow-x: auto; padding-bottom: 4px; }
  .heat-col { display: flex; flex-direction: column; gap: 3px; }
  .heat-cell { width: 10px; height: 10px; border-radius: 2px; }
  .exp-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
  @media (max-width: 760px) { .exp-layout { grid-template-columns: 1fr; } }
  .exp-list-item { text-align: left; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-family: inherit; margin-bottom: 8px; width: 100%; }
  .exp-list-item.active { background: var(--accent); color: #fff; border: none; }
  .skill-item { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; }
  .skill-pill { font-size: 11px; font-weight: 700; color: var(--accent); background: var(--bg); border-radius: 12px; padding: 3px 10px; }
  .tag-pill { font-size: 13px; font-weight: 600; color: var(--text); background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 7px 14px; display: inline-block; }
  .project-card { text-decoration: none; color: var(--text); display: block; transition: border-color 0.15s; cursor: pointer; }
  .project-card:hover { border-color: var(--accent); }
  .dots { display: flex; justify-content: center; gap: 6px; margin-top: 20px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); cursor: pointer; }
  .dot.active { background: var(--accent); }
  .icon-badge { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; }
  footer { text-align: center; padding: 20px 24px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
  svg.icon { width: 14px; height: 14px; flex-shrink: 0; vertical-align: -2px; }
  @keyframes fadeSwap { 0% { opacity: 0; transform: translateY(4px); } 15% { opacity: 1; transform: translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; } }
  @keyframes logoShine { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
  @keyframes logoPulse { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.08) rotate(-6deg); } }
  .role-fade { display: inline-block; animation: fadeSwap 2.2s ease; }
  .quote-fade { display: inline-block; animation: fadeSwap 4.5s ease; }
  .logo-wrap { display: flex; align-items: center; gap: 8px; }
  .logo-box { width: 28px; height: 28px; border-radius: 8px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: #fff; flex-shrink: 0; animation: logoPulse 3.2s ease-in-out infinite; }
  .logo-text { font-weight: 800; font-size: 18px; letter-spacing: -0.3px; white-space: nowrap; background-image: linear-gradient(90deg, var(--accent), #60a5fa, var(--text), var(--accent)); background-size: 300% auto; -webkit-background-clip: text; background-clip: text; color: transparent; animation: logoShine 5s linear infinite; }

  /* ---------- entrance / hover animation polish ---------- */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes popIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
  section.page, .hero { animation: fadeUp 0.5s ease both; }
  .card, .project-card, .skill-item, .exp-list-item, .tag-pill { animation: popIn 0.4s ease both; }
  .card { transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .project-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.1); }
  .skill-item { transition: transform 0.15s ease, border-color 0.15s ease; }
  .skill-item:hover { transform: translateY(-2px); border-color: var(--accent); }
  .btn { transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease; }
  .btn:hover { transform: translateY(-1px); }
  .icon-badge { transition: transform 0.15s ease; }
  .icon-badge:hover { transform: scale(1.08); }
  .exp-list-item { transition: transform 0.15s ease, border-color 0.15s ease; }
  .exp-list-item:hover { transform: translateX(2px); }
  .timeline-item, .hobby-tile { animation: fadeUp 0.5s ease both; }
  .hobby-tile:hover { transform: translateY(-3px); border-color: var(--accent); }

  nav .links { transition: max-height 0.25s ease; }

  /* ---------- responsive layout helpers ---------- */
  .home-grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding-top: 0; }

  /* ===== Large phones / small tablets (481-767px) ===== */
  @media (max-width: 767px) {
    .mobile-menu-btn { display: flex; }
    nav .links {
      display: none; flex-direction: column; width: 100%; position: absolute;
      top: 100%; left: 0; background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 6px 16px 14px; gap: 2px; box-shadow: 0 8px 16px rgba(0,0,0,0.08);
    }
    nav .links.open { display: flex; }
    nav .links button { width: 100%; text-align: left; padding: 10px 12px; }
    .home-grid-2col { grid-template-columns: 1fr; }
    .exp-layout { grid-template-columns: 1fr; }
    section.page { padding: 32px 18px 48px; }
    .hero { padding: 40px 18px; gap: 24px; }
    h1.hero-role { font-size: 30px; min-height: 40px; }
    .section-title-wrap h2 { font-size: 24px; }
  }

  /* ===== Mobile (320-480px) ===== */
  @media (max-width: 480px) {
    section.page { padding: 24px 14px 40px; }
    .hero { padding: 28px 14px; gap: 18px; }
    h1.hero-role { font-size: 24px; min-height: 32px; margin-bottom: 10px; }
    .hero p { font-size: 14px !important; }
    .section-title-wrap { margin-bottom: 22px; }
    .section-title-wrap h2 { font-size: 20px; }
    .section-title-wrap p { font-size: 12.5px; }
    .card { padding: 14px; }
    .btn { font-size: 12px; padding: 7px 11px; }
    nav { padding: 10px 14px; }
    .logo-text { font-size: 16px; }
    .grid-auto { grid-template-columns: 1fr !important; }
    .icon-badge { width: 38px; height: 38px; }
  }

  /* ===== Tablets (768-1023px) ===== */
  @media (min-width: 768px) and (max-width: 1023px) {
    section.page { padding: 36px 22px 52px; }
    .home-grid-2col { gap: 16px; }
  }

  /* ===== Laptops (1024-1439px) already covered by base styles ===== */

  /* ===== Large desktops (1440px+) ===== */
  @media (min-width: 1440px) {
    section.page, .hero, .home-grid-2col { max-width: 1280px; }
  }

  /* skills tabs: horizontal scroll on narrow screens instead of wrapping into a wall of buttons */
  @media (max-width: 480px) {
    .skills-tab-row { flex-wrap: nowrap !important; overflow-x: auto; justify-content: flex-start !important; padding-bottom: 6px; -webkit-overflow-scrolling: touch; }
    .skills-tab-row button { flex-shrink: 0; }
  }

  /* project carousel: arrows move below cards on phones so the card gets full width */
  @media (max-width: 480px) {
    .project-carousel-row { flex-direction: column; }
    .project-carousel-arrows { order: 2; display: flex; gap: 12px; justify-content: center; margin-top: 14px; }
  }
</style>

  function techIcon(name, size, iconKeyOverride) {
    size = size || 22;
    const key = (iconKeyOverride || name || "").trim().toLowerCase();
    if (ICON_DATA_URIS[key]) {
      return `<img src="${ICON_DATA_URIS[key]}" alt="${esc(name)}" width="${size}" height="${size}" style="border-radius:5px; object-fit:contain; flex-shrink:0;" />`;
    }
    const svg = INLINE_ICON_SVGS[key];
    if (svg) {
      return `<span style="display:inline-flex; width:${size}px; height:${size}px; border-radius:5px; overflow:hidden; flex-shrink:0; vertical-align:-4px;">${svg}</span>`;
    }
    return `<span style="display:inline-flex; align-items:center; justify-content:center; width:${size}px; height:${size}px; border-radius:6px; background:var(--border); color:var(--muted); font-size:${size*0.45}px; font-weight:700; flex-shrink:0; vertical-align:-4px;">${esc((name || "?")[0] || "?").toUpperCase()}</span>`;
  }

  const NAV = [
    { id: "home", label: "Home" },
    { id: "experience", label: "Experience" },
    { id: "projects", label: "Projects" },
    { id: "skills", label: "Skills" },
    { id: "education", label: "Education" },
    { id: "about", label: "About" },
  ];

  function renderNav() {
    document.getElementById('navLinks').innerHTML = NAV.map(n =>
      `<button class="${currentPage === n.id ? 'active' : ''}" onclick="goPage('${n.id}')">${esc(n.label)}</button>`
    ).join('');
  }

  function goPage(id) {
    currentPage = id;
    clearInterval(roleTimer);
    clearInterval(quoteTimer);
    renderNav();
    renderPage();
    const links = document.getElementById('navLinks');
    if (links) links.classList.remove('open');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function startRoleRotation() {
    if (!d.roles || d.roles.length < 2) return;
    clearInterval(roleTimer);
    roleTimer = setInterval(() => {
      roleIndex = (roleIndex + 1) % d.roles.length;
      const el = document.getElementById('roleText');
      if (el) {
        el.textContent = d.roles[roleIndex];
        el.classList.remove('role-fade');
        void el.offsetWidth;
        el.classList.add('role-fade');
      }
    }, 2200);
  }

  function startQuoteShuffle() {
    const quotes = d.motivationalQuotes || [];
    if (quotes.length < 2) return;
    let prevIdx = 0;
    clearInterval(quoteTimer);
    quoteTimer = setInterval(() => {
      let next = Math.floor(Math.random() * quotes.length);
      while (next === prevIdx && quotes.length > 1) next = Math.floor(Math.random() * quotes.length);
      prevIdx = next;
      const el = document.getElementById('quoteText');
      if (el) {
        el.textContent = `"${quotes[next]}"`;
        el.classList.remove('quote-fade');
        void el.offsetWidth;
        el.classList.add('quote-fade');
      }
    }, 4500);
  }

  function photoSrc() {
    return (d.photo && d.photo !== "profile.jpg") ? d.photo : EMBEDDED_PHOTO;
  }

  function resumeSrc() {
    return (d.resumeUrl && d.resumeUrl !== "resume.pdf") ? d.resumeUrl : EMBEDDED_RESUME;
  }

  function resumeBlobUrl(dataUri) {
    try {
      const [header, base64] = dataUri.split(",");
      const mimeMatch = header.match(/data:(.*?);base64/);
      const mime = mimeMatch ? mimeMatch[1] : "application/pdf";
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes], { type: mime });
      return URL.createObjectURL(blob);
    } catch (e) {
      return dataUri; // fallback if conversion fails
    }
  }

  function viewResume() {
    const src = resumeSrc();
    const url = src.startsWith("data:") ? resumeBlobUrl(src) : src;
    window.open(url, "_blank", "noopener,noreferrer");
  }
  function downloadResume() {
    const src = resumeSrc();
    const url = src.startsWith("data:") ? resumeBlobUrl(src) : src;
    const a = document.createElement("a");
    a.href = url;
    a.download = "Rahad_CV.pdf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function projectsPerPage() {

    const pages = Math.max(1, Math.ceil(list.length / perPage));

    const visible = list.slice(projIndex * perPage, projIndex * perPage + perPage);
    return `

            <button class="btn btn-icon" onclick="projNext()" ${projIndex >= pages - 1 ? 'style="opacity:0.4;"' : ''} aria-label="Next">→</button>

                : `<span style="font-size:12px; color:var(--muted); margin-top:6px;">No link yet</span>`;

      </section>` + contactSectionHtml();
  }

  function projNext() { const pages = Math.max(1, Math.ceil((d.projects || []).length / projectsPerPage())); projIndex = Math.min(pages - 1, projIndex + 1); renderPage(); }
  function setProjIndex(i) { projIndex = i; renderPage(); }

            ${rows.map(r => `
              <div style="background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px 14px; text-align:left;">
                <p style="font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.4px; margin:0 0 3px;">${esc(r.label)}</p>
                <p style="font-size:13.5px; margin:0;">${esc(r.value)}</p>
              </div>`).join('')}
          </div>` : ''}
        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
          ${d.github ? `<a href="${esc(d.github)}" target="_blank" rel="noreferrer" class="btn" style="background:#181717; color:#fff; border:none;">${svgGithub()} GitHub</a>` : ''}
          ${d.linkedin ? `<a href="${esc(d.linkedin)}" target="_blank" rel="noreferrer" class="btn" style="background:#0A66C2; color:#fff; border:none;">${svgLinkedin()} LinkedIn</a>` : ''}
          ${d.facebook ? `<a href="${esc(d.facebook)}" target="_blank" rel="noreferrer" class="btn" style="background:#1877F2; color:#fff; border:none;">${svgFacebook()} Facebook</a>` : ''}
          <a href="mailto:${esc(d.email)}" class="btn" style="background:var(--accent); color:#fff; border:none;">${svgMail()} Email</a>
        </div>
      </div>`;
  }

  function renderHobbies() {
    const hobbies = (d.hobbies || "").split(",").map(h => h.trim()).filter(Boolean);
    if (hobbies.length === 0) return `<p style="color:var(--muted);">Nothing here yet.</p>`;
    return `
      <div class="grid-auto" style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));">
        ${hobbies.map(h => {
          const { emoji, color } = hobbyIcon(h);
          return `
            <div class="hobby-tile" style="background:var(--bg); border:1px solid var(--border); border-radius:16px; padding:24px 16px; display:flex; flex-direction:column; align-items:center; gap:12px; transition:transform 0.15s ease, border-color 0.15s ease;">
              <div style="width:56px; height:56px; border-radius:50%; background:${color}22; display:flex; align-items:center; justify-content:center; font-size:26px;">${emoji}</div>
              <span style="font-size:13.5px; font-weight:700; text-align:center;">${esc(h)}</span>
            </div>`;
        }).join('')}
      </div>`;
  }

  function renderAbout() {
    const tabs = ["Personal Details", "Activities", "Hobbies"];
    let body = "";
    if (aboutTab === "Personal Details") body = renderPersonalDetails();
    else if (aboutTab === "Activities") body = `<p style="font-size:15px; line-height:1.75; max-width:640px; margin:0 auto;">${esc(d.activities || "Nothing here yet.")}</p>`;
    else if (aboutTab === "Hobbies") body = renderHobbies();

    const quotes = d.motivationalQuotes || [];
    const quoteBlock = quotes.length > 0 ? `
      <div style="margin-top:24px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px 24px; text-align:center;">
        <div style="font-size:20px; color:var(--accent); margin-bottom:10px;">✨</div>
        <p id="quoteText" class="quote-fade" style="font-size:16px; font-weight:600; font-style:italic; line-height:1.6; margin:0;">"${esc(quotes[0])}"</p>
      </div>` : '';

    const wrapped = aboutTab === "Personal Details"
      ? `<div class="card" style="padding:28px; text-align:center;">${body}</div>`
      : `<div style="text-align:center;">${body}</div>`;

    return `
      <section class="page" style="max-width:800px;">
        <div class="section-title-wrap"><h2>My <span style="color:var(--accent);">Details</span></h2></div>
        <div style="display:flex; gap:8px; justify-content:center; margin-bottom:24px; flex-wrap:wrap;">
          ${tabs.map(t => `<button class="btn btn-tab ${t === aboutTab ? 'active' : ''}" onclick="setAboutTab('${t}')">${t}</button>`).join('')}
        </div>
        ${wrapped}
        ${quoteBlock}
      </section>`;
  }
  function setAboutTab(t) { aboutTab = t; renderPage(); }

  // ---------- ROUTER ----------
  function renderPage() {
    const root = document.getElementById('pageRoot');
    if (currentPage === 'home') {
      root.innerHTML = renderHome();
      startRoleRotation();
      loadGithubHeatmap();
    } else if (currentPage === 'experience') {
      root.innerHTML = renderExperience();
    } else if (currentPage === 'projects') {
      root.innerHTML = renderProjects();
    } else if (currentPage === 'skills') {
      root.innerHTML = renderSkills();
    } else if (currentPage === 'education') {
      root.innerHTML = renderEducation();
    } else if (currentPage === 'about') {
      root.innerHTML = renderAbout();
      startQuoteShuffle();
    }
  }

  const levelColors = ["#1b2230", "#2d4a3e", "#3f7a5c", "#52a877", "#6fd99a"];
  function loadGithubHeatmap() {
    const el = document.getElementById('githubHeatmap');
    if (!el) return;
    const username = d.githubUsername;
    if (!username) { el.innerHTML = '<p style="font-size:13px; color:var(--muted);">Add a GitHub username in data.js to show this.</p>'; return; }
    fetch(`https://github-contributions-api.jogruber.de/v4/${username}?y=last`)
      .then(res => { if (!res.ok) throw new Error('not found'); return res.json(); })
      .then(json => {
        const contributions = json.contributions || [];
        const total = Object.values(json.total || {}).reduce((a, b) => a + b, 0);
        const weeks = [];
        let week = [];
        contributions.forEach(day => {
          week.push(day);
          if (week.length === 7) { weeks.push(week); week = []; }
        });
        if (week.length) weeks.push(week);
        const last26 = weeks.slice(-26);
        el.innerHTML = `
          <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:14px;">
            <span style="font-size:28px; font-weight:800; color:var(--accent);">${total.toLocaleString()}</span>
            <span style="font-size:13px; color:var(--muted);">contributions in the last year</span>
          </div>
          <div class="heat-grid">
            ${last26.map(w => `<div class="heat-col">${w.map(day => `<div class="heat-cell" title="${esc(day.date)}: ${day.count} contributions" style="background:${levelColors[day.level] || levelColors[0]};"></div>`).join('')}</div>`).join('')}
          </div>
          <p style="font-size:11px; color:var(--muted); margin-top:10px;">Live data, github.com/${esc(username)}</p>`;
      })
      .catch(() => {
        el.innerHTML = `<p style="font-size:13px; color:var(--muted);">Couldn't load GitHub data for "${esc(username)}". Check the username.</p>`;
      });
  }

  document.documentElement.setAttribute('data-theme', 'dark');
  renderNav();
  renderPage();
  document.getElementById('footerText').textContent = `© ${new Date().getFullYear()} ${d.name}. Built with care.`;

  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (currentPage === 'projects') renderPage();
      if (window.innerWidth >= 768) {
        const links = document.getElementById('navLinks');
        if (links) links.classList.remove('open');
      }
    }, 150);
  });
</script>

</body>
</html>
